<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Luciano Rodrigues - AI-Driven Procurement Leader</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta property="og:title" content="Luciano Rodrigues - AI-Driven Procurement Leader">
    <meta property="og:description" content="AI-powered procurement, strategic operations, and product development leadership.">
    <meta property="og:type" content="website">
</head>
<body>

<div class="loading" id="loading">
    <div class="loading-logo">LR.</div>
    <div class="loading-bar"><div class="loading-progress"></div></div>
</div>

<div class="lang-switcher" id="langSwitcher">
    <button class="lang-btn active" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="pt">PT</button>
    <button class="lang-btn" data-lang="es">ES</button>
    <button class="lang-btn" data-lang="fr">FR</button>
</div>

<div class="stat-modal-overlay" id="statModalOverlay" onclick="if(event.target===this)closeStatModal()">
    <div class="stat-modal">
        <button class="stat-modal-close" onclick="closeStatModal()">&times;</button>
        <div id="statModalContent"></div>
    </div>
</div>

<div class="project-gallery-modal" id="projectGalleryModal" onclick="if(event.target===this)closeProjectGallery()">
    <div class="gallery-modal-content">
        <span class="gallery-close" onclick="closeProjectGallery()">&times;</span>
        <div class="gallery-slider" id="gallerySlider"></div>
        <div class="gallery-controls">
            <button class="gallery-btn prev" onclick="changeProjectSlide(-1)"><i class="fas fa-chevron-left"></i></button>
            <div class="gallery-dots" id="galleryDots"></div>
            <button class="gallery-btn next" onclick="changeProjectSlide(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <i class="fas fa-arrow-up"></i>
</button>

<script src="script.js"></script>
</body>
</html>
